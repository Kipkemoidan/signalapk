<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="manifest" href="/manifest.json">
<title>Aviator Predictor Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    overflow-x:hidden;
}
/* SPLASH SCREEN */
#splashScreen {
    position: fixed; /* Stay in place */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000; /* Black background, or match your theme */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999; /* Make sure it's on top of everything */
    transition: opacity 0.7s ease-out; /* Smooth fade out, slightly longer for effect */
}

.splash-content {
    text-align: center;
    opacity: 0; /* Start hidden, will be faded in */
    animation: fadeIn 1s ease-in-out forwards; /* Animation for content */
}

.splash-content img {
    max-width: 500px; /* Slightly larger */
    height: auto;
    margin-bottom: 15px; /* Adjusted spacing */
    display: block; /* Ensures margin works as expected */
    margin-left: auto;
    margin-right: auto;
}

.splash-content h1 {
    color: #f23535; /* Match your header color */
    font-size: 38px; /* Slightly adjusted */
    font-weight: bold;
    letter-spacing: 1.5px; /* Slightly adjusted */
}

/* Fade out animation for the splash screen */
#splashScreen.hidden {
    opacity: 0;
    pointer-events: none; /* Prevent interaction once hidden */
}

@keyframes fadeIn {
    0% {
        opacity: 0;
        transform: translateY(20px);
    }
    80% { /* Keep content visible until just before fade-out */
        opacity: 1;
        transform: translateY(0);
    }
    100% { /* To ensure it completes animation before the screen disappears */
        opacity: 1;
        transform: translateY(0);
    }
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
/* PASSCODE PAGE */

#passcodePage{
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.topbar{
    width:100%;
    height:110px;
    background:#f23535;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:500;
}

.pass-title{
    color:#fff;
    font-size:42px;
    margin-top:55px;
    letter-spacing:1px;
}

.pass-input{
    width:370px;
    height:110px;
    margin-top:40px;
    border:none;
    outline:none;
    background:#fff;
    padding:0 28px;
    font-size:30px;
    border-radius:2px;
}

.submit-btn{
    margin-top:42px;
    background:#c7ff63;
    border:none;
    border-radius:40px;
    width:220px;
    height:95px;
    font-size:32px;
    font-weight:600;
    color:#222;
    box-shadow:
    0 0 15px rgba(199,255,99,0.75),
    0 0 35px rgba(199,255,99,0.45);
    transition:0.15s;
}

.submit-btn:active{
    transform:scale(0.96);
    filter:brightness(1.15);
}

/* IMAGE BOX */

.image-box{
    width:100%;
    height:330px;
    border:none;
    border-radius:24px;
    overflow:hidden;
    background:#050505;
    margin-top:120px;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:8px;
    background:#050505;
    display:block;
    transform:scale(1.12);
}

/* BOOKMAKER PAGE */

#bookmakerPage{
    display:none;
    background:#000;
    min-height:100vh;
    padding:100px 0 28px;
    overflow:y:auto;
}

.book-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.book-btn{
    width:90%;
    max-width:650px;
    height:150px;
    border-radius:38px;
    transition:0.15s;

}

.book-btn.flash-red{
    animation:redEdgeFlash 1s ease;
}

@keyframes redEdgeFlash{
    0%{
        box-shadow:
        0 0 0 rgba(255,0,0,0);
    }

    20%{
        box-shadow:
        0 0 12px rgba(255,0,0,0.95),
        0 0 28px rgba(255,0,0,0.9),
        0 0 45px rgba(255,0,0,0.75);
    }

    100%{
        box-shadow:
        0 0 0 rgba(255,0,0,0);
    }
}

.book-btn:active{
    transform:scale(0.97);
    filter:brightness(1.15);
    box-shadow:0 0 18px rgba(0,255,255,0.8);
}

.back-arrow{
    position:fixed;
    top:18px;
    left:18px;
    color:#fff;
    font-size:52px;
    font-weight:bold;
    cursor:pointer;
    z-index:9999;
    user-select:none;
}

/* MAIN PAGE */

#mainPage{
    display:none;
    padding-top:90px;
}

.header{
    width:100%;
    height:115px;
    background:#ef2f2f;
    display:flex;
    align-items:center;
    padding:0 24px;
}

.header-title{
    color:#fff;
    font-size:29px;
    font-weight:500;
    letter-spacing:1px;
}

.container{
    padding:16px;
}

.version{
    display:inline-block;
    background:#f04c4c;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    padding:10px 16px;
    border-radius:10px;
    margin-bottom:18px;
}

.main-image-box{
    width:100%;
    height:330px;
    border:2px solid #9dff66;
    border-radius:24px;
    overflow:hidden;
    background:#050505;
}

.main-image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transform:scale(1.08);
}

.circle-container{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:55px;
}

.circle{
    width:320px;
    height:320px;
    border-radius:50%;
    border:10px solid rgba(115,255,115,0.85);

    box-shadow:
    0 0 14px #52ff52,
    0 0 34px rgba(82,255,82,0.75),
    0 0 55px rgba(82,255,82,0.45);

    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.circle::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:10px solid transparent;
    pointer-events:none;
}

.multiplier{
    color:#df0028;
    font-size:84px;
    font-weight:500;
    position:relative;
    z-index:2;
}

.btn-wrap{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:65px;
}

.game-btn{
    background:#ffe44d;
    border:none;
    border-radius:26px;
    padding:24px 80px;
    color:#000;
    font-size:36px;
    font-weight:600;
}

.game-btn:hover{
    background:yellow;
    animation:blinkBtn 0.4s infinite;
}

@keyframes blinkBtn{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

.spin-blue::before{
    border-color:#00aaff;

    box-shadow:
    0 0 14px #00aaff,
    0 0 34px rgba(0,170,255,0.75),
    0 0 55px rgba(0,170,255,0.45);

    animation:spinCircle 1s linear;
}

@keyframes spinCircle{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}




/* NOTICE POPUP */

#noticePopup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:10000;
}

.notice-image-wrap{
    position:relative;
    width:90%;
    max-width:700px;
}

.notice-image{
    width:100%;
    display:block;
    border-radius:12px;
}

.notice-ok-btn{
    position:absolute;
    left:50%;
    bottom:-70px;
    transform:translateX(-50%);
    width:180px;
    height:55px;
    background:#ffe44d;
    color:#000;
    border:none;
    border-radius:14px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 12px rgba(255,228,77,0.8);
    transition:0.15s;
}

.notice-ok-btn:active{
    transform:translateX(-50%) scale(0.94);
    filter:brightness(1.1);
}

/* RESPONSIVE DESIGN */

img{
    max-width:100%;
    height:auto;
}

@media (max-width:768px){

    .topbar{
        height:80px;
        font-size:24px;
    }

    .pass-title{
        font-size:30px;
        text-align:center;
        padding:0 12px;
    }

    .pass-input,
    .submit-btn{
        width:90%;
        max-width:370px;
    }

    .image-box,
    .main-image-box{
        height:240px;
    }

    .circle{
        width:240px;
        height:240px;
    }

    .multiplier{
        font-size:60px;
    }

    .game-btn{
        width:90%;
        max-width:340px;
        padding:20px;
        font-size:28px;
    }

    .book-btn{
        height:110px;
    }

}

@media (max-width:480px){

    .topbar{
        font-size:20px;
    }

    .pass-title{
        font-size:24px;
        margin-top:35px;
    }

    .pass-input{
        height:75px;
        font-size:24px;
    }

    .submit-btn{
        height:75px;
        font-size:24px;
    }

    .image-box,
    .main-image-box{
        height:200px;
    }

    .circle{
        width:190px;
        height:190px;
        border-width:7px;
    }

    .multiplier{
        font-size:46px;
    }

    .header{
        height:85px;
    }

    .header-title{
        font-size:20px;
    }

    .version{
        font-size:16px;
    }

    .game-btn{
        font-size:22px;
        border-radius:18px;
    }

    .back-arrow{
        font-size:40px;
    }

}

</style>
</head>

<body>
<!-- SPLASH SCREEN -->
<div id="splashScreen">
    <div class="splash-content">
        <!-- Use 'aviation.jpg' or another image file if you have a specific logo for splash -->
        <img src="aviation.jpg" alt="Aviator Predictor Pro Logo">
        <h1>Aviator Predictor Pro</h1>
    </div>
</div>
<!-- PASSCODE PAGE -->

<div id="passcodePage">

    <div class="topbar">
        Enter Passcode
    </div>

    <div class="image-box">
        <img src="aviation.png">
    </div>

    <div class="pass-title">
        ENTER PASSCODE
    </div>

    <div style="position:relative;width:370px;margin-top:40px;">
    <input 
        type="password" 
        class="pass-input" 
        id="passcodeInput"
        placeholder="Passcode"
        style="width:100%;margin-top:0;padding-right:80px;"
    >

    <span 
        onclick="togglePasscode()" 
        style="position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:34px;color:rgba(85,85,85,0.45);cursor:pointer;user-select:none;"
    >
        👁
    </span>
</div>

    <button class="submit-btn" onclick="checkCode()">
        Submit
    </button>

</div>

<!-- BOOKMAKER PAGE -->

<div id="bookmakerPage">

    <div class="back-arrow" onclick="backToPasscode()">←</div>

    <div class="book-wrap">    
        <img src="a.webp" onclick="flashAndOpen(this,'sportybet')" class="book-btn">

<img src="b.webp" onclick="flashAndOpen(this,'betgr8')" class="book-btn">

<img src="c.webp" onclick="flashAndOpen(this,'pepeta')" class="book-btn">

<img src="d.webp" onclick="flashAndOpen(this,'spurbet')" class="book-btn">

<img src="e.webp" onclick="flashAndOpen(this,'odibets')" class="book-btn">

<img src="f.webp" onclick="flashAndOpen(this,'premierbet')" class="book-btn">

<img src="g.webp" onclick="flashAndOpen(this,'1xbet')" class="book-btn">

<img src="h.webp" onclick="flashAndOpen(this,'betika')" class="book-btn">

<img src="i.webp" onclick="flashAndOpen(this,'1win')" class="book-btn">
      
     
    </div>

</div>


<!-- NOTICE POPUP -->

<div id="noticePopup">
    <div class="notice-image-wrap">
        <img src="mama.png" class="notice-image">
        <button class="notice-ok-btn" onclick="confirmNotice()">OK</button>
    </div>
</div>
<!-- SIGNAL CODE POPUP -->

<div id="signalPopup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.88);
justify-content:center;
align-items:center;
z-index:10001;
">

    <div style="
    width:90%;
    max-width:420px;
    background:#111;
    border-radius:18px;
    padding:30px 22px;
    text-align:center;
    border:2px solid #ffe44d;
    ">

        <h2 style="
        color:#fff;
        margin-bottom:25px;
        font-size:28px;
        ">
            ENTER SIGNAL CODE
        </h2>

        <input
            type="password"
            id="signalCodeInput"
            placeholder="Enter Signal Code"
            style="
            width:100%;
            height:65px;
            border:none;
            outline:none;
            border-radius:12px;
            padding:0 18px;
            font-size:22px;
            margin-bottom:25px;
            "
        >

        <button
            onclick="checkSignalCode()"
            style="
            width:180px;
            height:55px;
            border:none;
            border-radius:12px;
            background:#ffe44d;
            color:#000;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            "
        >
            OK
        </button>

    </div>

</div>
<!-- MAIN PAGE -->

<div id="mainPage">

<div class="back-arrow" onclick="backToBookmaker()">←</div>

<div class="header">
    <div class="header-title">
        AVIATOR PREDICTOR PR...
    </div>
</div>

<div class="container">

    <div class="version">
        AVIATOR PREDICTOR PRO v12.1.8
    </div>

    <div class="main-image-box">
        <img src="aviator254.png">
    </div>

    <div class="circle-container">
        <div class="circle">
            <div class="multiplier" id="multi">
                1.00x
            </div>
        </div>
    </div>

    <div class="btn-wrap">
        <button class="game-btn" onclick="startGame()">
            Next Game
        </button>
    </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  get,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA11sm6WvgcUAU07mmr1Wo5cT20icRZ4Eg",
  authDomain: "signalapk.firebaseapp.com",
  databaseURL: "https://signalapk-default-rtdb.firebaseio.com",
  projectId: "signalapk",
  storageBucket: "signalapk.firebasestorage.app",
  messagingSenderId: "307674908350",
  appId: "1:307674908350:web:9611c145df846fea5d80ef"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

signInAnonymously(auth)
.then(() => {
    console.log("Logged in");
})
.catch((error) => {
    console.log(error);
});

const db = getDatabase(app);

let liveSignalCodes = {};
let currentPasscode = null;
let previousSignalCodes = null;


// LIVE SIGNALCODES LISTENER
onValue(ref(db, "signalcodes"), (snapshot) => {

    const newSignalCodes = snapshot.val() || {};

    // KICK USERS OUT IF SIGNALCODES CHANGE
    if(
        previousSignalCodes !== null &&
        JSON.stringify(newSignalCodes) !== JSON.stringify(previousSignalCodes)
    ){

        forceLogout();

    }

    liveSignalCodes = newSignalCodes;

    previousSignalCodes =
    JSON.parse(JSON.stringify(newSignalCodes));

    console.log("SIGNALCODES UPDATED:", liveSignalCodes);

});





let initialized = false;

function forceLogout(){

    alert("Session expired. Please login again.");

    document.getElementById("passcodeInput").value = "";
    document.getElementById("signalCodeInput").value = "";

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("bookmakerPage").style.display = "none";
    document.getElementById("signalPopup").style.display = "none";
    document.getElementById("noticePopup").style.display = "none";

    document.getElementById("passcodePage").style.display = "flex";
}

onValue(ref(db, "passcode/code"), (snapshot) => {

    const newCode = snapshot.val();

    if(initialized && currentPasscode !== null && newCode !== currentPasscode){

        currentPasscode = newCode;

        forceLogout();
        return;
    }

    currentPasscode = newCode;

    

});



function togglePasscode(){

    const input = document.getElementById("passcodeInput");

    if(input.type === "password"){
        input.type = "text";
    }else{
        input.type = "password";
    }

}

async function checkCode(){

    const input = document.getElementById("passcodeInput").value.trim();

    if(input === ""){
        alert("Enter passcode");
        return;
    }

    try{

        // 🔴 READ FROM ROOT (GUARANTEED WORKING)
        const snapshot = await get(ref(db, "/"));

        const data = snapshot.val();

        const realCode = data?.passcode?.code;

        

        if(input === realCode){

            document.getElementById("passcodePage").style.display = "none";
            document.getElementById("bookmakerPage").style.display = "block";

        }else{

            alert("Wrong passcode");

        }

    }catch(error){

        alert("Connection error. Try again.");
        console.log(error);

    }

}

window.checkCode = checkCode;
window.togglePasscode = togglePasscode;

let selectedBookmaker = "";

function flashAndOpen(btn, bookmakerName){

    console.log("Clicked bookmaker:", bookmakerName);

    selectedBookmaker = bookmakerName;

    btn.classList.add("flash-red");

    setTimeout(()=>{

        btn.classList.remove("flash-red");

document.getElementById("signalCodeInput").value = "";

        document.getElementById("noticePopup").style.display = "flex";

    },1000);

}

window.flashAndOpen = flashAndOpen;






function confirmNotice(){

    document.getElementById("noticePopup").style.display = "none";

    // OPEN SIGNAL POPUP
    document.getElementById("signalPopup").style.display = "flex";

}

window.confirmNotice = confirmNotice;


// CHECK SIGNAL CODE

async function checkSignalCode(){

    const enteredSignal =
    document.getElementById("signalCodeInput").value.trim();

    if(enteredSignal === ""){
        alert("Please enter signal code");
        return;
    }

    try{

        const snapshot = await get(ref(db, "signalcodes"));

const freshCodes = snapshot.val() || {};

const correctCode = freshCodes[selectedBookmaker];

        // 🔥 SAFETY CHECK
        if (!correctCode) {
            alert("Invalid bookmaker or no code set");
            return;
        }

        if(enteredSignal === correctCode){

            document.getElementById("signalPopup").style.display = "none";
            openMainPage();

        }else{
            alert("Invalid Signal code");
        }

    }catch(error){

        console.log(error);
        alert("Error loading signal code");
    }
}

window.checkSignalCode = checkSignalCode;

function openMainPage(){

    document.getElementById("bookmakerPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";

}

window.openMainPage = openMainPage;

function backToPasscode(){

    document.getElementById("bookmakerPage").style.display = "none";
    document.getElementById("passcodePage").style.display = "flex";

}

window.backToPasscode = backToPasscode;

function backToBookmaker(){

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("bookmakerPage").style.display = "block";

}

window.backToBookmaker = backToBookmaker;


let running = false;

function startGame(){

    if(running) return;

    running = true;

    const multi = document.getElementById("multi");
    const circle = document.querySelector(".circle");

    multi.innerHTML = "1.00x";

    circle.classList.add("spin-blue");

    setTimeout(()=>{
        circle.classList.remove("spin-blue");
    },1000);

    let rand = Math.random();

    let value;

    if(rand < 0.75){

        value = (Math.random() * 2 + 1).toFixed(2);

    }else if(rand < 0.93){

        value = (Math.random() * 5 + 3).toFixed(2);

    }else if(rand < 0.99){

        value = (Math.random() * 20 + 8).toFixed(2);

    }else{

        value = (Math.random() * 70 + 30).toFixed(2);

    }

    setTimeout(()=>{

        multi.innerHTML = value + "x";

        running = false;

    },1200);

}

window.startGame = startGame;


// SPLASH SCREEN CONTROL
window.addEventListener('load', () => {

    const splashScreen = document.getElementById('splashScreen');

    setTimeout(() => {

        splashScreen.style.opacity = '0';

        setTimeout(() => {
            splashScreen.style.display = 'none';
        }, 180);

    }, 250);

});

</script>

</body>
</html>
